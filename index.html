<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DOT MACHINE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --core: #CEADFF;
      --analog: #F6B9A2;
      --rush: #F2ADFF;
      --keyframe: #ADE7FF;
      --canvas: #FFF7FA;
      --gaffer: #1C0802;

      --bg: var(--canvas);
      --fg: var(--gaffer);
      --hairline: rgba(28, 8, 2, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
      min-width: 720px;
    }

    #rail {
      border-right: 1px solid var(--hairline);
      padding: 24px 20px;
      overflow-y: auto;
    }

    #stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      overflow: hidden;
    }

    #empty {
      font-family: 'Geist Mono', ui-monospace, monospace;
      color: rgba(28, 8, 2, 0.4);
      pointer-events: none;
    }

    #canvas {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    .mono { font-family: 'Geist Mono', ui-monospace, monospace; }

    #rail-head { margin-bottom: 28px; }
    .title { font-size: 14px; font-weight: 600; letter-spacing: 0.02em; margin: 0; }
    .subtitle { font-size: 11px; color: rgba(28, 8, 2, 0.5); margin: 4px 0 0; }

    .section { padding: 16px 0; border-top: 1px solid var(--hairline); }
    .section:first-of-type { border-top: 0; padding-top: 0; }
    .section-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(28, 8, 2, 0.5); margin: 0 0 12px; }
  </style>
</head>
<body>
  <main id="app">
    <aside id="rail">
      <header id="rail-head">
        <h1 class="title">DOT MACHINE</h1>
        <p class="subtitle mono">halftone tool</p>
      </header>
    </aside>
    <section id="stage">
      <div id="empty">drop an image or video here</div>
      <canvas id="canvas" hidden></canvas>
    </section>
  </main>
  <script>
    // ============================================================
    // SECTION 1: STATE — central reactive state object
    // ============================================================
    const state = {
      source: null,        // { kind: 'image'|'video', el, width, height, durationOk }
      cellSize: 12,
      dotScale: 1.0,
      brightness: 0.0,
      contrast: 0.0,
      dotOpacity: 1.0,
      invert: false,
      dotColor: '#1C0802',
      bgColor: '#FFF7FA',
      dotTransparent: false,
      bgTransparent: false,
    };

    const listeners = new Set();
    function setState(patch) {
      Object.assign(state, patch);
      listeners.forEach(fn => fn(state));
    }
    function onState(fn) { listeners.add(fn); fn(state); }
  </script>
</body>
</html>
